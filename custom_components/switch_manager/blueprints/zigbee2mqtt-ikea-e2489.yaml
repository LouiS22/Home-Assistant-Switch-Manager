name: IKEA BILRESA
service: Zigbee2MQTT
event_type: mqtt
mqtt_topic_format: zigbee2mqtt/+/action
buttons:
  - x: 125
    y: 115
    width: 45
    actions:
      - title: press
        conditions:
          - key: payload
            value: "on"
      - title: press 2x
        conditions:
          - key: payload
            value: on_double
      - title: hold
        conditions:
          - key: payload
            value: brightness_move_up
      - title: hold (released)
        conditions:
          - key: payload
            value: brightness_stop
  - x: 125
    y: 390
    width: 45
    actions:
      - title: press
        conditions:
          - key: payload
            value: "off"
      - title: press 2x
        conditions:
          - key: payload
            value: off_double
      - title: hold
        conditions:
          - key: payload
            value: brightness_move_down
      - title: hold (released)
        conditions:
          - key: payload
            value: brightness_stop
