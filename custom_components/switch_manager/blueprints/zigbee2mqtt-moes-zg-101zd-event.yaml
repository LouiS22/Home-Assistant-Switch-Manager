# Event mode triggering (operation_mode = event)
# https://www.zigbee2mqtt.io/devices/ZG-101ZD.html

name: Moes ZG-101ZD (TS004F) - Event
service: Zigbee2MQTT
event_type: mqtt
mqtt_topic_format: zigbee2mqtt/+/action
info: >
  Set operation_mode in Zigbee2MQTT to "event" to use this blueprint.
  In event mode the device publishes actions directly as the MQTT payload
  to the "<topic>/action" topic. Use the state topic blueprint instead
  if operation_mode is set to "command_mode" or "color_temperature".
buttons:
  - actions:
      - title: press
        conditions:
          - key: payload
            value: single
      - title: press 2x
        conditions:
          - key: payload
            value: double
      - title: hold
        conditions:
          - key: payload
            value: hold
      - title: rotate right
        conditions:
          - key: payload
            value: rotate_right
      - title: rotate left
        conditions:
          - key: payload
            value: rotate_left
